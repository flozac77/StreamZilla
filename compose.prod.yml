services:
  backend:
    restart: unless-stopped
    # Prod: crash-loop fast if startup is wrong so we notice instead of a
    # slow retry burning resources.
    healthcheck:
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 5

  frontend:
    restart: unless-stopped
    healthcheck:
      interval: 15s
      timeout: 3s
      start_period: 5s
      retries: 5

  mongodb:
    restart: unless-stopped

  redis:
    restart: unless-stopped
